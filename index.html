/* FILTERS */
.filters{background:#0C0C18;border:1px solid #18182A;border-radius:9px;padding:10px 12px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}

.conseil{background:#111120;border-left:2px solid #FF3B5C;padding:6px 10px;border-radius:0 6px 6px 0;font-size:10px;color:#C4C4D8;margin-bottom:10px;line-height:1.5}

.card-actions{display:flex;gap:8px;align-items:center}

/* MODAL */
.overlay{position:fixed;inset:0;background:#000000E8;display:flex;align-items:center;justify-content:center;z-index:200;padding:14px}

.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 100px)}

.bubble.assistant{background:#18182A;border:1px solid #2A2A3E;color:#C4C4D8;border-bottom-left-radius:4px}
.typing{display:flex;gap:3px;padding:8px 12px;background:#18182A;border:1px solid #2A2A3E;border-radius:12px}
.tdot{width:5px;height:5px;border-radius:50%;background:#FF3B5C}
.chat-row{display:flex;gap:8px}
.chat-in{background:#111120;border:1px solid #2A2A3E;color:#E2E2EE;padding:9px 13px;border-radius:8px;font-size:12px;font-family:inherit;outline:none;flex:1}
.send{background:linear-gradient(135deg,#FF3B5C,#FF8C42);border:none;color:#fff;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit}

/* ALERTS */
.alert-item{background:#0C0C18;border:1px solid #18182A;border-radius:9px;padding:11px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.form-in{background:#111120;border:1px solid #2A2A3E;color:#E2E2EE;padding:8px 11px;border-radius:7px;font-size:12px;font-family:inherit;outline:none;width:100%}
</style>

<body>
<div id="app"></div>
<script>
const SERVER = "https://tape-dealhunt-server-production.up.railway.app";

const CATS = [
  {id:"all",label:"Tout",icon:"◈"},
  {id:"tech",label:"Tech",icon:"⚡"},
  {id:"toys",label:"Jouets",icon:"🧸"},
  {id:"vehicles_kids",label:"Véhicules enfants",icon:"🚗"},
  {id:"vehicles",label:"Véhicules",icon:"🏎"},
  {id:"fashion",label:"Mode",icon:"👗"},
  {id:"furniture",label:"Mobilier",icon:"🛋"},
  {id:"appliances",label:"Électroménager",icon:"🔧"},
  {id:"sports",label:"Sport",icon:"⚽"},
];

const PLATS = [
  {id:"vinted",label:"Vinted",color:"#09B1BA"},
  {id:"leboncoin",label:"Leboncoin",color:"#F56B2A"},
  {id:"ricardo",label:"Ricardo.ch",color:"#E30613"},
  {id:"anibis",label:"Anibis.ch",color:"#FFD200"},
];

function getSearchUrls(title) {
  const q = encodeURIComponent(title||"");
  return [
    {label:"Vinted",color:"#09B1BA",url:`https://www.vinted.fr/catalog?search_text=${q}`},
    {label:"Leboncoin",color:"#F56B2A",url:`https://www.leboncoin.fr/recherche?text=${q}`},
    {label:"Facebook",color:"#1877F2",url:`https://www.facebook.com/marketplace/search?query=${q}`},
    {label:"Ricardo.ch",color:"#E30613",url:`https://www.ricardo.ch/fr/s/${q}/`},
    {label:"Anibis.ch",color:"#FFD200",url:`https://www.anibis.ch/fr/s?q=${q}`},
  ];
}

let S = {
  tab:"deals",
  deals:[],
  loading:true,
  serverOk:null,
  lastRefresh:null,
  cat:"all",
  onlyGood:false,
  sort:"recent",
  selectedDeal:null,
  dealAI:null,
  loadingAI:false,
  notifs:[],
  alerts:[
    {id:1,keyword:"iphone",maxPrice:500,active:true},
    {id:2,keyword:"vélo enfant",maxPrice:200,active:true},
    {id:3,keyword:"lego",maxPrice:100,active:true},
  ],
  showAddAlert:false,
  newKw:"", newMp:"",
  chatMsgs:[{role:"assistant",content:"Bonjour ! Je suis ton assistant DealHunt ⚡\n\nToutes tes notifications Leboncoin/Vinted sont analysées ici. Pose-moi n'importe quelle question sur les annonces reçues !"}],
  chatIn:"",
  chatLoading:false,
};

function set(u){Object.assign(S,u);render();}

async function loadDeals(){
  try {
    const res = await fetch(`${SERVER}/api/deals`);
    if(!res.ok) throw new Error();
    const d = await res.json();
    set({deals:d.listings||[], loading:false, serverOk:true, lastRefresh:new Date()});
  } catch(e){
    set({loading:false, serverOk:false});
  }
}

async function analyzeWithAI(deal){
  set({loadingAI:true, dealAI:null});
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:600,
        messages:[{role:"user",content:`Expert en bonnes affaires. Analyse cette annonce reçue via notification:\nTitre: "${deal.title}"\nTexte: "${deal.text||""}"\nPrix: ${deal.price}€ (marché estimé: ${deal.originalPrice}€, -${deal.discount}%)\nPlateforme: ${deal.platformLabel}\n\nRéponds UNIQUEMENT en JSON sans backticks:\n{"verdict":"EXCELLENT|BON|MOYEN|RISQUÉ","score":0-100,"resume":"1 phrase percutante","points_positifs":["..."],"points_attention":["..."],"conseil":"action concrète recommandée","prix_max":nombre ou null}`}]
      })
    });
    const d = await res.json();
    const txt = d.content.map(i=>i.text||"").join("");
    set({dealAI:JSON.parse(txt.replace(/```json|```/g,"").trim()), loadingAI:false});
  } catch(e){
    set({dealAI:{verdict:"ERREUR",score:0,resume:"Analyse indisponible.",points_positifs:[],points_attention:[],conseil:"",prix_max:null},loadingAI:false});
  }
}

async function sendChat(msg){
  if(!msg.trim()||S.chatLoading) return;
  const topDeals = S.deals.slice(0,15).map(d=>`- ${d.title} | ${d.price>0?d.price+"€":"prix inconnu"} | -${d.discount}% | ${d.platformLabel} | ${d.isGoodDeal?"✅ BONNE AFFAIRE":"❌"}`).join("\n");
  const updated = [...S.chatMsgs,{role:"user",content:msg}];
  set({chatMsgs:updated, chatIn:"", chatLoading:true});
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:600,
        system:`Tu es l'assistant DealHunt. Tu analyses les notifications d'annonces reçues de Vinted/Leboncoin/Ricardo sur le téléphone de l'utilisateur.\n\nDernières annonces reçues:\n${topDeals}\n\nSois direct, concis et utile. Donne des conseils actionables.`,
        messages:updated.map(m=>({role:m.role,content:m.content}))
      })
    });
    const d = await res.json();
    set({chatMsgs:[...updated,{role:"assistant",content:d.content.map(i=>i.text||"").join("")}],chatLoading:false});
  } catch(e){
    set({chatMsgs:[...updated,{role:"assistant",content:"Désolé, erreur. Réessaie !"}],chatLoading:false});
  }
}

function vc(v){return{EXCELLENT:"#00FF87",BON:"#A8FF3E",MOYEN:"#FFD200","RISQUÉ":"#FF3B5C"}[v]||"#888";}
function nc(){return S.notifs.filter(n=>!n.read).length;}

function filteredDeals(){
  let d = [...S.deals];
  if(S.cat!=="all") d=d.filter(x=>x.category===S.cat);
  if(S.onlyGood) d=d.filter(x=>x.isGoodDeal);
  if(S.sort==="discount") d.sort((a,b)=>b.discount-a.discount);
  else if(S.sort==="price") d.sort((a,b)=>a.price-b.price);
  else d.sort((a,b)=>new Date(b.receivedAt)-new Date(a.receivedAt));
  return d;
}

function render(){
  const fd = filteredDeals();
  const good = S.deals.filter(d=>d.isGoodDeal).length;
  const bestDisc = S.deals.length ? Math.max(...S.deals.map(d=>d.discount)) : 0;
  const n = nc();

  document.getElementById("app").innerHTML = `
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:26px;height:26px;background:linear-gradient(135deg,#FF3B5C,#FF8C42);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px">⚡</div>
      <span class="logo">DEAL<span>HUNT</span></span>
    </div>
    <div style="display:flex;gap:3px">
      ${[["deals","📋 Journal"],["chat","✦ IA"],["alerts","Alertes"],["notifs","🔔"]].map(([t,l])=>`
        <button class="tab-btn ${S.tab===t?"active":""}" onclick="set({tab:'${t}'})">
          ${t==="notifs"&&n>0?`<div class="notif-dot">${n}</div>`:""}${l}
        </button>`).join("")}
    </div>
    <div style="display:flex;align-items:center;gap:7px">
      <div class="status-pill" style="border-color:${S.serverOk===true?"#A8FF3E44":S.serverOk===false?"#FF3B5C44":"#2A2A3E"}">
        <span style="width:5px;height:5px;border-radius:50%;background:${S.serverOk===true?"#A8FF3E":S.serverOk===false?"#FF3B5C":"#FFD200"};display:inline-block;animation:${S.serverOk===null?"pulse 1s infinite":"none"}"></span>
        <span style="font-size:8px;color:${S.serverOk===true?"#A8FF3E":S.serverOk===false?"#FF3B5C":"#FFD200"}">${S.serverOk===true?"EN LIGNE":S.serverOk===false?"ERREUR":"..."}</span>
      </div>
      <button class="scan-btn" onclick="loadDeals()">
        <span style="font-size:12px">⟳</span> REFRESH
      </button>
    </div>
  </div>

  <div class="content">

  ${S.tab==="deals"?`
    <div class="stats">
      <div class="stat"><div class="stat-l">Notifications</div><div class="stat-v" style="color:#A8FF3E">${S.deals.length}</div></div>
      <div class="stat"><div class="stat-l">Bonnes affaires</div><div class="stat-v" style="color:#FF3B5C">${good}</div></div>
      <div class="stat"><div class="stat-l">Meilleure rédu.</div><div class="stat-v" style="color:#00C8FF">${bestDisc}%</div></div>
      <div class="stat"><div class="stat-l">Dernière MAJ</div><div class="stat-v" style="font-size:11px;color:#FFD200">${S.lastRefresh?S.lastRefresh.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}):"--:--"}</div></div>
    </div>

    <div class="filters">
      <button class="good-toggle ${S.onlyGood?"":"off"}" onclick="set({onlyGood:!S.onlyGood})">
        ${S.onlyGood?"✅ Bonnes affaires":"Toutes les notifs"}
      </button>
      <select onchange="set({sort:this.value})" style="background:#111120;border:1px solid #2A2A3E;color:#888;padding:4px 8px;border-radius:6px;font-family:inherit;font-size:9px;outline:none">
        <option value="recent" ${S.sort==="recent"?"selected":""}>Plus récentes</option>
        <option value="discount" ${S.sort==="discount"?"selected":""}>Meilleure réduction</option>
        <option value="price" ${S.sort==="price"?"selected":""}>Prix croissant</option>
      </select>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${CATS.map(c=>`<button class="filter-btn ${S.cat===c.id?"active":""}" onclick="set({cat:'${c.id}'})">${c.icon} ${c.label}</button>`).join("")}
      </div>
    </div>

    <div style="font-size:9px;color:#444;margin-bottom:10px">${fd.length} annonce${fd.length>1?"s":""} • ${S.deals.length} au total</div>

    ${S.loading?`<div class="loading"><div class="spin">⟳</div><div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:6px">Chargement...</div><div style="font-size:11px;color:#555">Connexion au serveur Railway</div></div>`:""}

    ${!S.loading&&S.deals.length===0?`
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:8px">Aucune notification reçue</div>
        <div style="font-size:11px;color:#555;margin-bottom:6px">Active les alertes sur Vinted et Leboncoin.</div>
        <div style="font-size:11px;color:#444">MacroDroid enverra automatiquement chaque annonce ici pour analyse.</div>
      </div>
    `:""}

    ${!S.loading&&fd.length===0&&S.deals.length>0?`
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div>Aucune annonce pour ces filtres</div>
        <button onclick="set({cat:'all',onlyGood:false})" style="margin-top:12px;background:#18182A;border:1px solid #2A2A3E;color:#888;padding:7px 14px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:10px">Réinitialiser</button>
      </div>
    `:""}

    <div class="deals">
      ${fd.map(deal=>`
        <div class="deal-card ${deal.isHot?"hot":deal.isGoodDeal?"good":"bad"}">
          ${deal.isHot?`<div class="hot-bar"></div>`:deal.isGoodDeal?`<div class="good-bar"></div>`:""}
          
          <div class="card-top">
            <div class="card-badges">
              <span class="badge" style="background:${deal.platformColor||"#888"}22;color:${deal.platformColor||"#888"}">${(deal.platformLabel||"").toUpperCase()}</span>
              ${deal.isGoodDeal
                ?`<span class="verdict-badge" style="background:#A8FF3E22;color:#A8FF3E">✅ BONNE AFFAIRE</span>`
                :`<span class="verdict-badge" style="background:#FF3B5C11;color:#555">❌ Pas rentable</span>`
              }
              ${deal.aiVerdict?`<span class="verdict-badge" style="background:${vc(deal.aiVerdict.verdict)}22;color:${vc(deal.aiVerdict.verdict)}">${deal.aiVerdict.emoji||""} ${deal.aiVerdict.verdict}</span>`:""}
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              ${deal.discount>0?`<span class="discount-badge" style="background:${deal.discount>40?"#FF3B5C22":deal.discount>20?"#FFD20022":"#18182A"};color:${deal.discount>40?"#FF3B5C":deal.discount>20?"#FFD200":"#555"}">-${deal.discount}%</span>`:""}
            </div>
          </div>

          <div class="deal-title">${deal.title||"Annonce"}</div>
          ${deal.text&&deal.text!==deal.title?`<div class="deal-text">${deal.text}</div>`:""}
          <div class="deal-meta">${deal.platformLabel||""} • ${deal.postedAt||""} • cat: ${deal.category||"?"}</div>

          <div class="price-row">
            ${deal.price>0
              ?`<span class="price">${deal.price}€</span>${deal.originalPrice>deal.price?`<span class="orig-price">${deal.originalPrice}€ estimé</span>`:""}`
              :`<span class="price no-price">Prix non détecté</span>`
            }
          </div>

          ${deal.aiVerdict?.conseil?`<div class="conseil ${deal.isGoodDeal?"good":""}">${deal.aiVerdict.conseil}</div>`:""}
          ${deal.aiVerdict?.risques&&deal.aiVerdict.risques.length>2?`<div style="font-size:10px;color:#775533;margin-bottom:8px">⚠ ${deal.aiVerdict.risques}</div>`:""}

          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div class="score-bar-wrap">
              <div class="score-bar"><div class="score-fill" style="width:${deal.score}%;background:${deal.score>75?"#A8FF3E":deal.score>50?"#FFD200":"#FF3B5C"}"></div></div>
              <span style="font-size:9px;color:#444">${deal.score}/100</span>
            </div>
            <span style="font-size:9px;color:#444">${new Date(deal.receivedAt).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</span>
          </div>

          <div class="card-actions">
            <button class="ai-btn" onclick="set({selectedDeal:${JSON.stringify(deal).replace(/"/g,"&quot;")}});analyzeWithAI(S.selectedDeal)">✦ Analyser</button>
            <button onclick="set({selectedDeal:${JSON.stringify(deal).replace(/"/g,"&quot;")},dealAI:null})" style="background:#18182A;border:1px solid #2A2A3E;color:#888;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:10px;font-family:inherit">Voir détails →</button>
          </div>
        </div>
      `).join("")}
    </div>
  `:""}

  ${S.tab==="chat"?`
    <div class="chat-wrap">
      <div style="margin-bottom:10px">
        <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:3px">✦ Assistant <span style="color:#FF3B5C">IA</span></div>
        <div style="font-size:10px;color:#444">${S.deals.length} notifications analysées disponibles</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        ${["Meilleures affaires ?","Risques à éviter ?","Que vaut cette annonce ?","Quoi acheter en priorité ?"].map(q=>`<button onclick="set({chatIn:'${q}'})" style="background:#0C0C18;border:1px solid #18182A;color:#666;padding:4px 9px;border-radius:20px;cursor:pointer;font-size:9px;font-family:inherit">${q}</button>`).join("")}
      </div>
      <div class="messages" id="msgs">
        ${S.chatMsgs.map(m=>`
          <div class="msg-row ${m.role}">
            ${m.role==="assistant"?`<div class="avatar">⚡</div>`:""}
            <div class="bubble ${m.role}">${m.content.replace(/</g,"&lt;").replace(/\n/g,"<br/>")}</div>
          </div>`).join("")}
        ${S.chatLoading?`<div class="msg-row assistant"><div class="avatar" style="animation:pulse 1s infinite">⚡</div><div class="typing">${[0,200,400].map(d=>`<div class="tdot" style="animation:pulse 1s infinite ${d}ms"></div>`).join("")}</div></div>`:""}
      </div>
      <div class="chat-row">
        <input class="chat-in" id="ci" placeholder="Pose une question sur tes annonces..." value="${S.chatIn}" oninput="S.chatIn=this.value" onkeydown="if(event.key==='Enter')sendChat(S.chatIn)"/>
        <button class="send" onclick="sendChat(S.chatIn)" ${S.chatLoading||!S.chatIn.trim()?"disabled":""} style="opacity:${S.chatLoading||!S.chatIn.trim()?0.5:1}">↵</button>
      </div>
    </div>
  `:""}

  ${S.tab==="alerts"?`
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800">Alertes <span style="color:#FF3B5C">(${S.alerts.length})</span></div>
        <button onclick="set({showAddAlert:!S.showAddAlert})" style="background:linear-gradient(135deg,#FF3B5C,#FF8C42);border:none;color:#fff;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:10px;font-family:inherit">+ Ajouter</button>
      </div>
      ${S.showAddAlert?`
        <div style="background:#0C0C18;border:1px solid #FF3B5C44;border-radius:9px;padding:13px;margin-bottom:13px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <div><div style="font-size:8px;color:#555;letter-spacing:1px;margin-bottom:4px">MOT-CLÉ</div><input class="form-in" id="kw" placeholder="ex: iPhone 14" value="${S.newKw}" oninput="S.newKw=this.value"/></div>
            <div><div style="font-size:8px;color:#555;letter-spacing:1px;margin-bottom:4px">PRIX MAX (€)</div><input class="form-in" id="mp" type="number" placeholder="ex: 400" value="${S.newMp}" oninput="S.newMp=this.value"/></div>
          </div>
          <div style="display:flex;gap:8px">
            <button onclick="addAlert()" style="background:linear-gradient(135deg,#FF3B5C,#FF8C42);border:none;color:#fff;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:10px;font-family:inherit">Créer</button>
            <button onclick="set({showAddAlert:false})" style="background:#18182A;border:1px solid #2A2A3E;color:#888;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:10px;font-family:inherit">Annuler</button>
          </div>
        </div>`:""}
      ${S.alerts.map(a=>`
        <div class="alert-item" style="opacity:${a.active?1:0.5}">
          <div>
            <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px">${a.keyword}</div>
            <span style="background:#A8FF3E22;color:#A8FF3E;font-size:9px;padding:2px 7px;border-radius:4px">Max ${a.maxPrice===9999?"∞":a.maxPrice+"€"}</span>
          </div>
          <div style="display:flex;gap:6px">
            <button onclick="toggleAlert(${a.id})" style="background:${a.active?"#A8FF3E22":"#18182A"};border:1px solid ${a.active?"#A8FF3E":"#2A2A3E"};color:${a.active?"#A8FF3E":"#555"};padding:4px 9px;border-radius:5px;cursor:pointer;font-size:9px;font-family:inherit">${a.active?"● ON":"○ OFF"}</button>
            <button onclick="delAlert(${a.id})" style="background:transparent;border:1px solid #2A2A3E;color:#444;padding:4px 8px;border-radius:5px;cursor:pointer">✕</button>
          </div>
        </div>`).join("")}
      <div style="margin-top:14px;background:#0C0C18;border:1px solid #18182A;border-radius:9px;padding:13px">
        <div style="font-size:8px;color:#555;letter-spacing:1px;margin-bottom:6px">ℹ️ COMMENT ÇA MARCHE</div>
        <div style="font-size:10px;color:#555;line-height:1.6">MacroDroid intercepte tes notifications Vinted/Leboncoin → les envoie au serveur Railway → analyse IA automatique → apparaît dans le journal avec verdict et conseils.</div>
      </div>
    </div>
  `:""}

  ${S.tab==="notifs"?`
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px">
        <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800">Notifications <span style="color:#FF3B5C">(${nc()})</span></div>
        <button onclick="set({notifs:S.notifs.map(n=>({...n,read:true}))})" style="background:#18182A;border:1px solid #2A2A3E;color:#888;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:9px;font-family:inherit">Tout lire</button>
      </div>
      ${S.notifs.length===0?`<div class="empty"><div class="empty-icon">🔔</div><div>Aucune notification système</div></div>`:`
        ${S.notifs.map(n=>`
          <div onclick="set({notifs:S.notifs.map(x=>x.id===${n.id}?{...x,read:true}:x)})" style="background:#0C0C18;border:1px solid ${n.read?"#18182A":"#FF3B5C44"};border-left:3px solid ${n.read?"#18182A":"#FF3B5C"};border-radius:8px;padding:10px 13px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:11px;color:${n.read?"#555":"#E2E2EE"};margin-bottom:2px">${n.title}</div><div style="font-size:10px;color:#444">${n.message}</div></div>
            <span style="font-size:9px;color:#333;flex-shrink:0;margin-left:8px">${n.time}</span>
          </div>`).join("")}
      `}
    </div>
  `:""}

  </div>

  ${S.selectedDeal?`
    <div class="overlay" onclick="set({selectedDeal:null,dealAI:null})">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px">
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <span class="badge" style="background:${S.selectedDeal.platformColor||"#888"}22;color:${S.selectedDeal.platformColor||"#888"}">${(S.selectedDeal.platformLabel||"").toUpperCase()}</span>
            ${S.selectedDeal.isGoodDeal?`<span style="background:#A8FF3E22;color:#A8FF3E;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700">✅ BONNE AFFAIRE</span>`:`<span style="background:#FF3B5C11;color:#555;font-size:9px;padding:2px 7px;border-radius:4px">❌ Pas rentable</span>`}
          </div>
          <button class="modal-close" onclick="set({selectedDeal:null,dealAI:null})">✕</button>
        </div>
        <div class="modal-title">${S.selectedDeal.title||"Annonce"}</div>
        ${S.selectedDeal.text&&S.selectedDeal.text!==S.selectedDeal.title?`<div class="modal-text">${S.selectedDeal.text}</div>`:`<div style="height:8px"></div>`}
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:14px">
          ${S.selectedDeal.price>0?`<span style="font-size:26px;font-family:'Syne',sans-serif;font-weight:800;color:#A8FF3E">${S.selectedDeal.price}€</span>${S.selectedDeal.originalPrice>S.selectedDeal.price?`<span style="font-size:12px;color:#2A2A3E;text-decoration:line-through">${S.selectedDeal.originalPrice}€ estimé</span>`:""}`:`<span style="font-size:16px;color:#555">Prix non détecté dans la notification</span>`}
          ${S.selectedDeal.discount>0?`<span style="background:#FF3B5C22;color:#FF3B5C;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;font-family:'Syne',sans-serif">-${S.selectedDeal.discount}%</span>`:""}
        </div>

        <div style="font-size:8px;color:#444;letter-spacing:1px;margin-bottom:7px">RECHERCHER SUR LES PLATEFORMES</div>
        <div class="plinks">
          ${getSearchUrls(S.selectedDeal.title).map(p=>`<a href="${p.url}" target="_blank" rel="noopener noreferrer" class="plink" style="background:${p.color}11;border:1px solid ${p.color}44;color:${p.color}"><span>${p.label}</span><span>↗</span></a>`).join("")}
        </div>

        <button onclick="analyzeWithAI(S.selectedDeal)" ${S.loadingAI?"disabled":""} style="width:100%;padding:10px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px;background:#18182A;border:1px solid #2A2A3E;color:#888;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;opacity:${S.loadingAI?0.7:1}">
          <span style="display:inline-block;animation:${S.loadingAI?"spin 0.8s linear infinite":"none"}">${S.loadingAI?"⟳":"✦"}</span>
          ${S.loadingAI?"Analyse en cours...":"Analyser en détail avec l'IA"}
        </button>

        ${S.dealAI&&!S.loadingAI?`
          <div class="ai-result">
            <div style="display:flex;justify-content:space-between;margin-bottom:9px">
              <span style="color:${vc(S.dealAI.verdict)};font-family:'Syne',sans-serif;font-weight:800;font-size:13px">● ${S.dealAI.verdict}</span>
              <span style="font-size:10px;color:#666">Score <strong style="color:#fff">${S.dealAI.score}/100</strong></span>
            </div>
            ${S.dealAI.resume?`<div style="font-size:11px;color:#8888AA;margin-bottom:9px;font-style:italic">"${S.dealAI.resume}"</div>`:""}
            ${S.dealAI.points_positifs?.length?`<div style="margin-bottom:7px"><div style="font-size:8px;color:#A8FF3E;letter-spacing:1px;margin-bottom:3px">✓ POSITIFS</div>${S.dealAI.points_positifs.map(p=>`<div style="font-size:10px;color:#557755;margin-bottom:2px">${p}</div>`).join("")}</div>`:""}
            ${S.dealAI.points_attention?.length?`<div style="margin-bottom:7px"><div style="font-size:8px;color:#FFD200;letter-spacing:1px;margin-bottom:3px">⚠ ATTENTION</div>${S.dealAI.points_attention.map(p=>`<div style="font-size:10px;color:#775533;margin-bottom:2px">${p}</div>`).join("")}</div>`:""}
            ${S.dealAI.conseil?`<div style="background:#0C0C18;border:1px solid #2A2A3E;border-radius:7px;padding:9px;margin-bottom:7px"><div style="font-size:8px;color:#444;letter-spacing:1px;margin-bottom:3px">RECOMMANDATION</div><div style="font-size:11px;color:#E2E2EE">${S.dealAI.conseil}</div></div>`:""}
            ${S.dealAI.prix_max?`<div style="font-size:10px;color:#555">Prix max conseillé : <strong style="color:#A8FF3E">${S.dealAI.prix_max}€</strong></div>`:""}
          </div>
        `:""}
      </div>
    </div>
  `:""}
  `;

  if(S.tab==="chat"){setTimeout(()=>{const m=document.getElementById("msgs");if(m)m.scrollTop=m.scrollHeight;},50);}
}

function addAlert(){
  const kw=document.getElementById("kw")?.value||S.newKw;
  const mp=document.getElementById("mp")?.value||S.newMp;
  if(!kw) return;
  set({alerts:[...S.alerts,{id:Date.now(),keyword:kw,maxPrice:parseInt(mp)||9999,active:true}],showAddAlert:false,newKw:"",newMp:""});
}
function toggleAlert(id){set({alerts:S.alerts.map(a=>a.id===id?{...a,active:!a.active}:a)});}
function delAlert(id){set({alerts:S.alerts.filter(a=>a.id!==id)});}

// Init
render();
loadDeals();
setInterval(loadDeals, 60000); // refresh toutes les minutes
</script>
</body>
</html>

echo "Done - $(wc -c < /mnt/user-data/outputs/dealhunt-app.html) bytes"
