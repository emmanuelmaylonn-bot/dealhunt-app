  const q = encodeURIComponent(title);

async function fetchListings() {
  try {
    const kw = ["iphone","lego","vélo enfant","ps5","nintendo","macbook","voiture enfant","thermomix","dyson","airpods"].join(",");
    const res = await fetch(`${SERVER}/api/scan?keywords=${encodeURIComponent(kw)}`);
    if (!res.ok) throw new Error("Server error");
    const data = await res.json();
    return data.listings || [];
  } catch(e) { return null; }
}

async function runScan() {
  setState({scanning:true});
  const results = await fetchListings();
  if (results && results.length > 0) {
    setState({listings:results, serverStatus:"online", lastScan:new Date(), scanning:false, loading:false});
    const hot = results.filter(l=>l.discount>35).slice(0,2);
    if (hot.length) {

      setState({notifications:[...notifs,...state.notifications].slice(0,30)});
    }
  } else {
    setState({serverStatus:"error", scanning:false, loading:false});
    addNotif("⚠️ Plateformes inaccessibles","Les sites bloquent le scraping temporairement.");
  }
}

function addNotif(title, message) {
  setState({notifications:[{id:Date.now(),title,message,time:"À l'instant",read:false},...state.notifications].slice(0,30)});
}

async function analyzeWithAI(deal) {
  setState({loadingAnalysis:true, dealAnalysis:null});
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:800,
        messages:[{role:"user",content:`Expert en bonnes affaires. Analyse : "${deal.title}" à ${deal.price}€ (marché ~${deal.originalPrice}€, -${deal.discount}%). État: ${deal.condition}. Plateforme: ${deal.platformLabel}. Réponds UNIQUEMENT en JSON sans backticks: {"verdict":"EXCELLENT|BON|MOYEN|RISQUÉ","score":0-100,"resume":"1 phrase","points_positifs":["..."],"points_attention":["..."],"conseil_achat":"action","prix_max_negociation":nombre}`}]
      })
    });
    const data = await res.json();
    const txt = data.content.map(i=>i.text||"").join("");
    setState({dealAnalysis:JSON.parse(txt.replace(/```json|```/g,"").trim()), loadingAnalysis:false});
  } catch(e) {
    setState({dealAnalysis:{verdict:"ERREUR",score:0,resume:"Analyse indisponible.",points_positifs:[],points_attention:[],conseil_achat:"",prix_max_negociation:null}, loadingAnalysis:false});
  }
}

async function sendChat(msg) {
  if (!msg.trim() || state.chatLoading) return;
  const topDeals = state.listings.slice(0,15).map(l=>`- ${l.title} | ${l.price}€ (-${l.discount}%) | ${l.platformLabel} | ${l.location}`).join("\n");
  const updated = [...state.chatMessages,{role:"user",content:msg}];
  setState({chatMessages:updated, chatInput:"", chatLoading:true});
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:800,

        messages:updated.map(m=>({role:m.role,content:m.content}))
      })
    });
    const data = await res.json();
    setState({chatMessages:[...updated,{role:"assistant",content:data.content.map(i=>i.text||"").join("")}], chatLoading:false});
  } catch(e) {
    setState({chatMessages:[...updated,{role:"assistant",content:"Désolé, une erreur est survenue."}], chatLoading:false});
  }

      <div class="stats-grid">
        ${[["Annonces","${state.listings.length}","#A8FF3E"],["Deals >30%","${state.listings.filter(l=>l.discount>30).length}","#FF3B5C"],["Meilleure rédu.","${Math.max(0,...state.listings.map(l=>l.discount))}%","#00C8FF"]].map(([l,v,c])=>`
          <div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value" style="color:${c}">${v}</div></div>
        `).join("")}
      </div>
      ${state.lastScan?`<div style="font-size:9px;color:#444;margin-bottom:12px;text-align:right">Scan: ${state.lastScan.toLocaleTimeString("fr-FR")}</div>`:""}
      <div class="cats">
        ${CATEGORIES.map(c=>`<button class="cat-btn ${state.selectedCategory===c.id?"active":""}" onclick="setState({selectedCategory:'${c.id}'})">${c.icon} ${c.label}</button>`).join("")}
      </div>
      <div class="filters">
        ${PLATFORMS.map(p=>`<button class="plat-btn" style="background:${state.selectedPlatforms.includes(p.id)?p.color+"22":"#111"};border-color:${state.selectedPlatforms.includes(p.id)?p.color:"#222"};color:${state.selectedPlatforms.includes(p.id)?p.color:"#444"}" onclick="togglePlat('${p.id}')">${p.label}</button>`).join("")}
        <div style="margin-left:auto;display:flex;align-items:center;gap:7px">
          <span style="font-size:9px;color:#555">Rédu. min</span>
          <input type="range" min="0" max="60" value="${state.filterDiscount}" oninput="setState({filterDiscount:+this.value})" style="accent-color:#FF3B5C;width:70px"/>
          <span style="font-size:11px;color:#FF3B5C;min-width:26px">${state.filterDiscount}%</span>
        </div>
      </div>
      <div style="font-size:10px;color:#444;margin-bottom:12px">${fl.length} annonce${fl.length>1?"s":""}</div>
      ${fl.length===0?`<div class="empty-state"><div class="empty-icon">🔍</div><div>Aucune annonce pour ces filtres</div><button onclick="setState({selectedCategory:'all',filterDiscount:0})" style="margin-top:12px;background:#18182A;border:1px solid #2A2A3E;color:#888;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:10px">Réinitialiser</button></div>`:`
        <div class="deals-grid">
          ${fl.map(deal=>`
            <div class="deal-card ${deal.isHot?"hot":""}" onclick="openDeal('${deal.id}')">
              ${deal.isHot?`<div class="hot-bar"></div>`:""}
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px">
                <span class="badge" style="background:${deal.platformColor||"#888"}22;color:${deal.platformColor||"#888"}">${(deal.platformLabel||"").toUpperCase()}</span>
                ${deal.discount>0?`<span class="discount-badge" style="background:${deal.discount>40?"#FF3B5C22":deal.discount>20?"#FFD20022":"#18182A"};color:${deal.discount>40?"#FF3B5C":deal.discount>20?"#FFD200":"#666"}">-${deal.discount}%</span>`:""}
              </div>
              <div class="deal-title">${deal.title||""}</div>
              <div class="deal-meta">${deal.condition||""} • ${deal.location||""} • ${deal.postedAt||""}</div>
              <div style="display:flex;align-items:baseline">
                <span class="deal-price">${deal.price||0}€</span>
                ${deal.originalPrice>deal.price?`<span class="deal-orig">${deal.originalPrice}€</span>`:""}
              </div>
              <div class="deal-actions">
                <a href="${deal.url||"#"}" target="_blank" rel="noopener noreferrer" class="view-btn" style="background:${deal.platformColor||"#888"}22;border:1px solid ${deal.platformColor||"#888"}44;color:${deal.platformColor||"#888"}" onclick="event.stopPropagation()">Voir ↗</a>
                <button class="ai-btn" onclick="event.stopPropagation();openDeal('${deal.id}');analyzeNow('${deal.id}')">✦ IA</button>
              </div>
            </div>
          `).join("")}
        </div>
      `}
    `}
  `:""}

  <!-- CHAT -->
  ${state.tab==="chat"?`
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-title">✦ Assistant <span style="color:#FF3B5C">IA</span></div>
        <div class="chat-subtitle">Connecté à ${state.listings.length} annonces en temps réel</div>
      </div>
      <div class="quick-btns">
        ${["Meilleures affaires ?","Véhicules enfants ?","Meilleur deal tech ?","Quoi revendre ?"].map(q=>`<button class="quick-btn" onclick="setState({chatInput:'${q}'})">${q}</button>`).join("")}
      </div>
      <div class="messages" id="chat-msgs">
        ${state.chatMessages.map(m=>`
          <div class="msg-row ${m.role}">
            ${m.role==="assistant"?`<div class="msg-avatar">⚡</div>`:""}
            <div class="msg-bubble ${m.role}">${m.content.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br/>")}</div>
          </div>
        `).join("")}
        ${state.chatLoading?`<div class="msg-row assistant"><div class="msg-avatar" style="animation:pulse 1s infinite">⚡</div><div class="typing">${[0,200,400].map(d=>`<div class="typing-dot" style="animation:pulse 1s infinite ${d}ms"></div>`).join("")}</div></div>`:""}
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-in" placeholder="Pose une question sur les annonces..." value="${state.chatInput}" oninput="state.chatInput=this.value" onkeydown="if(event.key==='Enter'&&!event.shiftKey){sendChat(state.chatInput)}"/>
        <button class="send-btn" onclick="sendChat(state.chatInput)" ${state.chatLoading||!state.chatInput.trim()?"disabled":""} style="opacity:${state.chatLoading||!state.chatInput.trim()?0.5:1}">↵</button>
      </div>
    </div>
  `:""}

  <!-- ALERTS -->
  ${state.tab==="alerts"?`
    <div class="alerts-header">
      <div class="alerts-title">Alertes <span style="color:#FF3B5C">(${state.alerts.length})</span></div>
      <button class="add-btn" onclick="setState({showAddAlert:!state.showAddAlert})">+ Ajouter</button>
    </div>
    ${state.showAddAlert?`
      <div class="add-form">
        <div class="form-row">
          <div><div class="form-label">MOT-CLÉ</div><input class="form-input" id="kw-in" placeholder="ex: iPhone 14" value="${state.newKeyword}" oninput="state.newKeyword=this.value"/></div>
          <div><div class="form-label">PRIX MAX (€)</div><input class="form-input" id="mp-in" type="number" placeholder="ex: 400" value="${state.newMaxPrice}" oninput="state.newMaxPrice=this.value"/></div>
        </div>
        <div class="form-btns">
          <button class="add-btn" onclick="addAlert()">Créer</button>
          <button class="cancel-btn" onclick="setState({showAddAlert:false})">Annuler</button>
        </div>
      </div>
    `:""}
    ${state.alerts.map(a=>`
      <div class="alert-item" style="opacity:${a.active?1:0.5}">
        <div>
          <div class="alert-name">${a.keyword}</div>
          <span class="alert-price">Max ${a.maxPrice===9999?"∞":a.maxPrice+"€"}</span>
        </div>
        <div>
          <button class="toggle-btn" style="background:${a.active?"#A8FF3E22":"#18182A"};border:1px solid ${a.active?"#A8FF3E":"#2A2A3E"};color:${a.active?"#A8FF3E":"#555"}" onclick="toggleAlert(${a.id})">${a.active?"● ON":"○ OFF"}</button>
          <button class="del-btn" onclick="deleteAlert(${a.id})">✕</button>
        </div>
      </div>
    `).join("")}
    <div style="margin-top:16px;background:#0C0C18;border:1px solid #18182A;border-radius:10px;padding:14px">
      <div style="font-size:9px;color:#555;letter-spacing:1px;margin-bottom:6px">ℹ️ FONCTIONNEMENT</div>
      <div style="font-size:11px;color:#666;line-height:1.6">MacroDroid intercepte les notifications Vinted/Leboncoin et les envoie au serveur Railway pour analyse IA. Les bonnes affaires apparaissent ici automatiquement.</div>
    </div>
  `:""}

  <!-- NOTIFICATIONS -->
  ${state.tab==="notifications"?`
    <div class="notifs-header">
      <div class="alerts-title">Notifications <span style="color:#FF3B5C">(${nc})</span></div>
      <button class="cancel-btn" onclick="markAllRead()">Tout lire</button>
    </div>
    ${state.notifications.length===0?`<div class="empty-state"><div class="empty-icon">🔔</div><div>Aucune notification</div><div style="font-size:11px;color:#2A2A3E;margin-top:4px">Lance un scan pour détecter des bonnes affaires</div></div>`:`
      ${state.notifications.map(n=>`
        <div class="notif-item" style="border:1px solid ${n.read?"#18182A":"#FF3B5C44"};border-left:3px solid ${n.read?"#18182A":"#FF3B5C"}" onclick="markRead(${n.id})">
          <div>
            <div class="notif-title" style="color:${n.read?"#555":"#E2E2EE"}">${n.title}</div>
            <div class="notif-msg">${n.message}</div>
          </div>
          <div class="notif-time">${n.time}</div>
        </div>
      `).join("")}
    `}
  `:""}

  </div>

  <!-- MODAL -->
  ${state.selectedDeal?`
    <div class="modal-overlay" onclick="setState({selectedDeal:null,dealAnalysis:null})">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <span class="badge" style="background:${state.selectedDeal.platformColor||"#888"}22;color:${state.selectedDeal.platformColor||"#888"}">${(state.selectedDeal.platformLabel||"").toUpperCase()}</span>
          <button class="close-btn" onclick="setState({selectedDeal:null,dealAnalysis:null})">✕</button>
        </div>
        <div class="modal-title">${state.selectedDeal.title||""}</div>
        <div class="modal-meta">${state.selectedDeal.condition||""} • ${state.selectedDeal.location||""} • ${state.selectedDeal.postedAt||""}</div>
        <div class="modal-price-row">
          <span class="modal-price">${state.selectedDeal.price||0}€</span>
          ${state.selectedDeal.originalPrice>state.selectedDeal.price?`<span style="font-size:13px;color:#2A2A3E;text-decoration:line-through">${state.selectedDeal.originalPrice}€</span>`:""}
          ${state.selectedDeal.discount>0?`<span style="background:#FF3B5C22;color:#FF3B5C;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;font-family:'Syne',sans-serif">-${state.selectedDeal.discount}%</span>`:""}
        </div>
        <a href="${state.selectedDeal.url||"#"}" target="_blank" rel="noopener noreferrer" style="display:block;background:linear-gradient(135deg,#FF3B5C,#FF8C42);color:#fff;text-align:center;padding:11px;border-radius:8px;text-decoration:none;font-size:12px;font-family:inherit;font-weight:700;margin-bottom:10px;letter-spacing:0.5px">Voir l'annonce sur ${state.selectedDeal.platformLabel||""} ↗</a>
        <div class="platform-links">
          <div class="plinks-title">CHERCHER AUSSI SUR</div>
          <div class="plinks-grid">
            ${getSearchUrls(state.selectedDeal.title||"").filter(p=>p.id!==state.selectedDeal.platform).map(p=>`<a href="${p.url}" target="_blank" rel="noopener noreferrer" class="plink" style="background:${p.color}11;border:1px solid ${p.color}44;color:${p.color}"><span>${p.label}</span><span>↗</span></a>`).join("")}
          </div>
        </div>
        <button class="analyze-btn" onclick="analyzeNow('${state.selectedDeal.id}')" ${state.loadingAnalysis?"disabled":""} style="opacity:${state.loadingAnalysis?0.7:1}">
          <span style="display:inline-block;animation:${state.loadingAnalysis?"spin 0.8s linear infinite":"none"}">${state.loadingAnalysis?"⟳":"✦"}</span>
          ${state.loadingAnalysis?"Analyse en cours...":"Analyser avec l'IA"}
        </button>
        ${state.dealAnalysis&&!state.loadingAnalysis?`
          <div class="ai-result">
            <div class="verdict-row">
              <span class="verdict" style="color:${verdictColor(state.dealAnalysis.verdict)}">● ${state.dealAnalysis.verdict}</span>
              <span class="score-text">Score <strong style="color:#fff">${state.dealAnalysis.score}/100</strong></span>
            </div>
            ${state.dealAnalysis.resume?`<div class="resume">"${state.dealAnalysis.resume}"</div>`:""}
            ${state.dealAnalysis.points_positifs?.length?`<div style="margin-bottom:8px"><div class="points-title" style="color:#A8FF3E">✓ POSITIFS</div>${state.dealAnalysis.points_positifs.map(p=>`<div class="point" style="color:#557755">${p}</div>`).join("")}</div>`:""}
            ${state.dealAnalysis.points_attention?.length?`<div style="margin-bottom:8px"><div class="points-title" style="color:#FFD200">⚠ ATTENTION</div>${state.dealAnalysis.points_attention.map(p=>`<div class="point" style="color:#775533">${p}</div>`).join("")}</div>`:""}
            ${state.dealAnalysis.conseil_achat?`<div class="conseil-box"><div class="conseil-label">RECOMMANDATION</div><div class="conseil-text">${state.dealAnalysis.conseil_achat}</div></div>`:""}
            <div style="display:flex;justify-content:space-between;font-size:10px;color:#555">
              ${state.dealAnalysis.prix_max_negociation?`<span>Offrir max: <strong style="color:#A8FF3E">${state.dealAnalysis.prix_max_negociation}€</strong></span>`:""}
            </div>
          </div>
        `:""}
      </div>
    </div>
  `:""}
  `;

  // Scroll chat to bottom
  if (state.tab==="chat") {
    setTimeout(()=>{const m=document.getElementById("chat-msgs");if(m)m.scrollTop=m.scrollHeight;},50);
  }
}

function togglePlat(id) {
  const sp = state.selectedPlatforms.includes(id) ? state.selectedPlatforms.filter(x=>x!==id) : [...state.selectedPlatforms,id];
  setState({selectedPlatforms:sp});
}

function openDeal(id) {
  const deal = state.listings.find(l=>l.id==id);
  if (deal) setState({selectedDeal:deal, dealAnalysis:null});
}

function analyzeNow(id) {
  const deal = state.listings.find(l=>l.id==id);
  if (deal) { setState({selectedDeal:deal}); analyzeWithAI(deal); }
}

function addAlert() {
  const kw = document.getElementById("kw-in")?.value || state.newKeyword;
  const mp = document.getElementById("mp-in")?.value || state.newMaxPrice;
  if (!kw) return;
  setState({alerts:[...state.alerts,{id:Date.now(),keyword:kw,maxPrice:parseInt(mp)||9999,active:true}],showAddAlert:false,newKeyword:"",newMaxPrice:""});
}

function toggleAlert(id) {
  setState({alerts:state.alerts.map(a=>a.id===id?{...a,active:!a.active}:a)});
}

function deleteAlert(id) {
  setState({alerts:state.alerts.filter(a=>a.id!==id)});
}

function markRead(id) {
  setState({notifications:state.notifications.map(n=>n.id===id?{...n,read:true}:n)});
}

function markAllRead() {
  setState({notifications:state.notifications.map(n=>({...n,read:true}))});
}

// Init
render();
runScan();
setInterval(runScan, 10*60*1000);
</script>
</body>
</html>
